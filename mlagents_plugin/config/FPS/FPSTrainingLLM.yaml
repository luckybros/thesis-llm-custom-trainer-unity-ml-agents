behaviors:
  FPS:
    trainer_type: llm_trainer
    hyperparameters:
      batch_size: 512 # per solo azioni discreti consigliano 512, buono anche per il discorso bug, altrimenti non si aggiorna
      buffer_size: 5120
      learning_rate: 0.0003
      beta: 0.02
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant # per il self play è buono costante piuttosto che lineare
      communicator: zmq
      llm_refresh_interval: 1
      observation_types:
        - name: RAYCAST_FRONT
          type: RAYCAST
          index: 0
        - name: VECTORIAL
          type: VECTORIAL
          index: 1
    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      rnd:
        gamma: 0.99
        strength: 0.05
        encoding_size: 64
        learning_rate: 0.0001
    keep_checkpoints: 1
    max_steps: 1000000 
    time_horizon: 256 #1000 #64
    summary_freq: 1000 # default a 10000
    threaded: false # a self play consigliano di levarlo 
    checkpoint_interval: 50000
env_settings:
#  max_lifetime_restarts: 0
  env_args:
    - -logFile
    - debug_unity.log
  max_lifetime_restarts: 0
  timeout_wait: 100
