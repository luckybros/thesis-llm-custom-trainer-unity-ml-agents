llm_settings:
  game_desc: |
    Tanks is a simple game where tanks compete in a battle arena. Yout objective is destory
    the other player, you can shoot and take power ups. Power Ups can help winning, since they provide
    temporary buffs like increased speed, damage reduction, fast shooting or healing.
  agent_role: |
    You are a game AI assistant deployed in the testing 
    environment of Tanks. You need to make decisions for various types of tasks 
    in the game by analyzing the game background and current situation, as well as 
    task progress and other information, to determine the best next action from the
    provided game operations. 
    You control the game character and can execute a set 
    of available actions. After evaluating the provided information, you should 
    consider the current game state and the possible outcomes after executing the 
    decision actions, and present your reasoning process and precisely return the 
    next action you will take along with the necessary parameters for that action.
    You should choose actions for 1 agent. Indicate the agent, and then the action
    chosen for that agent.
    You MUST structure your response in two parts:
    1. [Reasoning]: Explain your thought process, analyzing observations and history.
    2. [Action]: The final strict format for the agent.
    IMPORTANT RULES:
    1. You MUST output EXACTLY ONE choice for EACH of the following action categories: Move, Turn, Shoot.
    2. You CANNOT skip any category. Even if you don't want to move or turn, you MUST write 'Stay' for that category.
    3. You CANNOT invent choices. You MUST use exactly the strings provided in the 'options' list. 
       - E.g., for Shoot, use "Shoot" or "Don't shoot". Do NOT write "Shoot at enemy".
    Always reply in the following format:
    Reasoning:
    <write your reasoning here>
    Agent <index>: 
      <action_name>
        <action_choice>
    For example:
    Reasoning:
    I see the enemy is in quite far from me, so I choose to go FORWARD.
    Agent 0: 
      Move
        Move forward
      Turn
        Stay
      Shoot
        Don't shoot
    Do not add extra words AFTER the action line. Never change the format of the action block.
  history_length: 3
  model_name: openai/gpt-oss-120b
  task: Choose the best action for current game state in order explore the game states and win the game.
  actions: 
    discrete:
      - name: Move
        options: [Stay, Move forward, Move backward]
        description: >
          Move the character forward or backward.
      - name: Turn
        options: [Stay, Turn right, Turn left]
        description: >
          Turn the direction which the character is facing.
      - name: Shoot
        options: [Don't shoot, Shoot]
        description: >
          Shoot a projectile in the direction which the character is facing.
  use_visual_obs: False
  use_vectorial_obs: True
  use_grid_obs: False
  use_raycast_obs: True
  num_agents: 1
  features: 
    vectorial:
      pos_x:
        type: "BUCKET"
        indices: [0]
        mapping:
          - label: "FAR_LEFT"
            min: -1.1
            max: -0.6
          - label: "LEFT"
            min: -0.59
            max: -0.2
          - label: "CENTER_X"
            min: -0.19
            max: 0.2
          - label: "RIGHT"
            min: 0.21
            max: 0.6
          - label: "FAR_RIGHT"
            min: 0.61
            max: 1.1
      pos_z:
        type: "BUCKET"
        indices: [1]
        mapping:
          - label: "BOTTOM"
            min: -1.1
            max: -0.6
          - label: "BACK"
            min: -0.59
            max: -0.2
          - label: "CENTER_Z"
            min: -0.19
            max: 0.2
          - label: "FRONT"
            min: 0.21
            max: 0.6
          - label: "FAR_FRONT"
            min: 0.61
            max: 1.1
      can_shoot:
        type: "BOOL"
        indices: [2]
        mapping:
          0: "CAN'T SHOOT"
          1: "CAN SHOOT"
      health:
        type: "BUCKET"
        indices: [3]
        mapping:
          - label: "CRITICAL"
            min: 0.0
            max: 0.25
          - label: "LOW"
            min: 0.251
            max: 0.50
          - label: "MEDIUM"
            min: 0.51
            max: 0.80
          - label: "HEALTHY"
            min: 0.81
            max: 1.1
      enemy_health:
        type: "BUCKET"
        indices: [4]
        mapping:
          - label: "CRITICAL"
            min: 0.0
            max: 0.25
          - label: "LOW"
            min: 0.251
            max: 0.50
          - label: "MEDIUM"
            min: 0.51
            max: 0.80
          - label: "HEALTHY"
            min: 0.81
            max: 1.1
      power_up:
        type: "ONE_HOT"
        indices: [5, 6, 7, 8, 9, 10, 11]
        mapping:
          0: "None"
          1: "Speed Up"
          2: "Damage Reduction"
          3: "Fast Shooting"
          4: "Healing"
          5: "Invincibility"
          6: "Damage Multiplier"
    raycast:
      RAYCAST_FRONT:
        detectable_tags:
          0: "TANK"
          1: "POWER UP" 
          2: "OBSTACLE"
        num_detectable_tags: 3
        num_rays: 21
        # direzioni logiche
        direction: [
          FAR_LEFT, LEFT, SLIGHT_LEFT, 
          FORWARD, 
          SLIGHT_RIGHT, RIGHT, FAR_RIGHT
        ] # 7 direzioni logiche
        distance:
          - label: IMMEDIATE
            min: 0.0
            max: 0.2
          - label: CLOSE
            min: 0.2
            max: 0.5
          - label: MEDIUM
            min: 0.5
            max: 0.8
          - label: FAR
            min: 0.8   
            max: 1.1
      RAYCAST_BACK:
        detectable_tags:
          0: "TANK"
          1: "POWER UP" 
          2: "OBSTACLE"
        num_detectable_tags: 3
        num_rays: 9
          # direzioni logiche
        direction: [
          LEFT, CENTER, RIGHT
        ]
        distance:
          - label: IMMEDIATE
            min: 0.0
            max: 0.2
          - label: CLOSE
            min: 0.2
            max: 0.5
          - label: MEDIUM
            min: 0.5
            max: 0.8
          - label: FAR
            min: 0.8   
            max: 1.1
